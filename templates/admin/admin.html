{% extends 'base.html' %}

{% block title %}منصة نقطة - المسئول{% endblock %}

{% block style %}

<style>
  h1, h2 {
    font-family: var(--font-header);
    text-align: center;
  }
</style>

{% endblock %}

{% block content %}

{% if not is_logged %}

<section class="container" dir="ltr">
  <h1 class="font-header">Admin Login <img src="{{ url_for('static', filename='icons/lock-key.svg') }}" /></h1>
</section>

<form class="container" dir="ltr" hx-post="/api/admin/login" hx-indicator="#submit-progress" hx-disabled-elt="#submit-btn" >
  <fieldset>
    <label for="username">
Username *
      <input
        type="text"
        name="username"
        id="username"
        required
        aria-required="true"
      />
    </label>
    <label for="password">
Password *
      <input
        type="password"
        name="password"
        id="password"
        placeholder="******"
        required
        aria-required="true"
      />
    </label>
  </fieldset>
  
  <input type="submit" value="Login" id="submit-btn" />
  
  <progress id="submit-progress" class="htmx-indicator"></progress>
</form>

{% elif is_logged %}
<section class="container">
  <h1>صفحة المسئول</h1>
  
  <h2>قائمة التحكم</h2>
  
  <div>
    <a href="/admin/table/users"><article>المستخدمون</article></a>
    <a href="/admin/table/collectors"><article>المحصلون</article></a>
  </div>
  
</section>


<hr />

<section style="text-align: center;">
  <button class="secondary" hx-get="/api/logout">تسجيل الخروج</button>
</section>

{% endif %}

{% endblock %}
